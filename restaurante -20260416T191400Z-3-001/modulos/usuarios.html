<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USUARIOS</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
</head>

<body>
    <center>
        <div class="field">
            <label class="label">NOMBRE</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese su nombre">
            </div>
        </div>

        <div class="field">
            <label class="label">APELLIDO</label>
            <div class="control">
                <input class="input" type="text" placeholder="Ingrese su apellido">
            </div>
        </div>

        <div class="control">
            <label class="label">DOCUMENTO</label>
            <div class="select">
                <select>
                    <option>SELECCIONE SU TIPO DE DOCUMENTO</option>
                    <option>T.I</option>
                    <option>C.C</option>
                    <option>C.E</option>
                </select>
            </div>
        </div>

        <div class="field">
            <label class="label">NUMERO DE DOCUMENTO</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input">
            </div>
        </div>

        <div class="field">
            <label class="label">TELEFONO</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input">
            </div>
        </div>




        <div class="field is-horizontal">
            <div class="field-label">
                <label class="label"> GENERO </label>
            </div>
            <div class="field-body">
                <div class="field is-narrow">
                    <div class="control">
                        <label class="radio">
                            <input type="radio" name="member">
                            Femenino
                        </label>
                        <label class="radio">
                            <input type="radio" name="member">
                            Masculino

                            <div class="field">
                                <label class="label">CARGO</label>
                                <div class="control">
                                    <input class="input" type="text" placeholder="Text input">
                                </div>
                            </div>

                            <div class="field">
                                <label class="label">FECHA DE NACIMIENTO</label>
                                <div class="control">
                                    <input class="input" type="text" placeholder="Text input">
                                </div>
                            </div>

                            <div class="field">
                                <label class="label">CORREO ELECTRONICO</label>
                                <p class="control has-icons-left has-icons-right">
                                    <input class="input" type="email" placeholder="Ingrese su correo">
                                    <span class="icon is-small is-left">
                                        <i class="fas fa-envelope"></i>
                                    </span>
                                    <span class="icon is-small is-right">
                                        <i class="fas fa-check"></i>
                                    </span>
                                </p>
                            </div>
                            <div class="field">
                                <label class="label">CONTRASEÑA</label>
                                <p class="control has-icons-left">
                                    <input class="input" type="password" placeholder="Ingrese su contraseña">
                                    <span class="icon is-small is-left">
                                        <i class="fas fa-lock"></i>
                                    </span>
                                </p>
                            </div>
                            <div class="field">
                                <p class="control">
                                </p>
                            </div>


                            <div class="field is-grouped">
                                <div class="control">
                                    <button class="button is-link">Submit</button>
                                </div>
                                <div class="control">
                                    <button class="button is-link is-light">Cancel</button>
                                </div>
                            </div>
    </center>
</body>

</html>
