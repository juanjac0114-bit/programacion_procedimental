<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Restaurante</title>

    <link rel="stylesheet" href="../css/pedidos.css">
</head>
<body>
    <a href="../index.html" class="boton-volver">
    ⬅ Volver al Inicio
</a>

    <section class="pedidos">

        <div class="contenedor">

            <h2>Haz tu Pedido</h2>
            <p>Completa la información para realizar tu pedido</p>

            <form class="formulario">

                <div class="campo">
                    <label>Nombre de usuario</label>
                    <input type="text" placeholder="Ingresa tu nombre">
                </div>

                <div class="campo">
                    <label>Producto</label>
                    <input type="text" placeholder="¿Qué deseas pedir?">
                </div>

                <div class="campo">
                    <label>Cantidad</label>
                    <input type="number" placeholder="Cantidad">
                </div>

                <div class="campo">
                    <label>Dirección</label>
                    <input type="text" placeholder="Ingresa tu dirección">
                </div>

                <div class="campo">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="Número de teléfono">
                </div>

                <div class="campo">
                    <label>Método de pago</label>

                    <select>
                        <option>Efectivo</option>
                        <option>Tarjeta</option>
                        <option>Nequi</option>
                        <option>Daviplata</option>
                    </select>
                </div>

                <div class="boton">
                    <button type="submit">Realizar Pedido</button>
                </div>

            </form>

        </div>

    </section>

</body>
</html>
